name: "Setup Build Environment"
description: "Sets up MSVC, vcpkg, and caching for build jobs. Requires code to be checked out first."
inputs:
    cache-key-suffix:
        description: "A suffix to make the cache key unique (e.g., validation, tests)"
        required: true
    cmake-preset:
        description: "The CMake configure preset name. Used to resolve the expected generator for cache validation."
        required: false
        default: "ALL"
    build-dir:
        description: "The CMake binary directory to cache."
        required: false
        default: "build/ALL"
outputs:
    msvc-version:
        description: "The detected MSVC compiler version"
        value: ${{ steps.msvc_version.outputs.version }}
runs:
    using: "composite"
    steps:
        - name: Enable Git Long Paths
          run: git config --system core.longpaths true
          shell: bash

        - name: Install CMake 4.x
          uses: lukka/get-cmake@v4.3.3
          with:
              cmakeVersion: "~4.2.0"
              useCloudCache: false

        - name: Install Visual Studio 2026 Build Tools
          shell: pwsh
          run: |
              $installerUrl = "https://aka.ms/vs/stable/vs_BuildTools.exe"
              $installerPath = "$env:TEMP\vs_buildtools.exe"
              Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
              $proc = Start-Process -FilePath $installerPath -ArgumentList `
                  "--quiet", "--wait", "--norestart", "--nocache", `
                  "--add", "Microsoft.VisualStudio.Workload.VCTools", `
                  "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64", `
                  "--add", "Microsoft.VisualStudio.Component.Windows11SDK.26100" `
                  -Wait -NoNewWindow -PassThru
              $successExitCodes = @(0, 3010) # 3010 = ERROR_SUCCESS_REBOOT_REQUIRED
              if ($successExitCodes -notcontains $proc.ExitCode) {
                  throw "Visual Studio Build Tools installer failed with exit code $($proc.ExitCode)."
              }
              if ($proc.ExitCode -eq 3010) {
                  Write-Warning "Visual Studio Build Tools installer requested a reboot; continuing on GitHub runner."
              }
              Remove-Item $installerPath -ErrorAction SilentlyContinue

        - name: Setup MSVC environment
          # Swapped from ilammy/msvc-dev-cmd@v1 (node20, deprecated) to
          # TheMrMilchmann/setup-msvc-dev@v4 (node24). The new action has no
          # `vsversion` input — the prior step installs only VS Build Tools
          # 2026, so default detection picks it up.
          uses: TheMrMilchmann/setup-msvc-dev@v4.0.0
          with:
              arch: x64

        - name: Get MSVC version
          id: msvc_version
          shell: pwsh
          run: |
              "int main() { return 0; }" | Out-File -FilePath "dummy.cpp" -Encoding ASCII
              $output = & cl.exe /Bv dummy.cpp 2>&1
              $version = $null
              $lines = $output -split "`n|`r"
              foreach ($line in $lines) {
                  if ($line -match 'Version ([0-9]+\.[0-9]+\.[0-9]+)') {
                      $version = $Matches[1]
                      break
                  }
                  elseif ($line -match '([0-9]+\.[0-9]+\.[0-9]+)') {
                      $version = $Matches[1]
                      break
                  }
              }
              if (-not $version) {
                  if ($output -match 'Version ([0-9]+\.[0-9]+\.[0-9]+)') {
                      $version = $Matches[1]
                  }
                  elseif ($output -match '([0-9]+\.[0-9]+\.[0-9]+)') {
                      $version = $Matches[1]
                  }
              }
              if ($version) {
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding UTF8
              } else {
                  throw "MSVC version not found"
              }
              Remove-Item "dummy.cpp" -ErrorAction SilentlyContinue

        - name: Setup vcpkg
          uses: lukka/run-vcpkg@v11.6
          with:
              vcpkgJsonGlob: vcpkg.json

        # Cache strategy is split by event trust level to avoid the
        # pull_request_target cache-poisoning class of bug (CodeQL rule
        # `actions/cache-poisoning/poisonable-step`):
        #
        # - Trusted events (push to dev/main, workflow_dispatch, workflow_call
        #   from a release pipeline): use the combined `actions/cache` which
        #   restores at this step and auto-saves at job-end. Cache writes only
        #   happen from these trusted contexts.
        # - Untrusted events (pull_request_target, pull_request): use the
        #   restore-only sub-action. PR builds still benefit from caches
        #   warmed by trusted runs but cannot themselves write back, so a
        #   malicious PR cannot poison a cache that a later default-branch
        #   run would consume.
        #
        # Both steps use the same key / restore-keys so cache hits cross the
        # trust boundary in the allowed direction (trusted-saved → untrusted-restore).

        - name: Cache CMake build output (trusted, restore + save)
          if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
          uses: actions/cache@v5
          with:
              path: ${{ inputs.build-dir }}
              key: ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.event.inputs.cache-key-suffix || 'default' }}-${{ hashFiles('.gitmodules', 'extern/**', 'CMakePresets.json', 'vcpkg.json', 'vcpkg-configuration.json') }}
              restore-keys: |
                  ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.event.inputs.cache-key-suffix || 'default' }}-
                  ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-

        - name: Restore CMake build cache (untrusted PR, restore-only)
          if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
          uses: actions/cache/restore@v5
          with:
              path: ${{ inputs.build-dir }}
              key: ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.event.inputs.cache-key-suffix || 'default' }}-${{ hashFiles('.gitmodules', 'extern/**', 'CMakePresets.json', 'vcpkg.json', 'vcpkg-configuration.json') }}
              restore-keys: |
                  ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-${{ github.event.inputs.cache-key-suffix || 'default' }}-
                  ${{ runner.os }}-cmake-msvc-${{ steps.msvc_version.outputs.version }}-${{ inputs.cache-key-suffix }}-

        - name: Remove stale CMake cache if configuration changed
          shell: pwsh
          run: |
              $buildDir = "${{ inputs.build-dir }}"
              $cacheFile = "$buildDir/CMakeCache.txt"
              if (Test-Path $cacheFile) {
                $content = Get-Content $cacheFile -Raw
                $stale = $false

                # Check drive letter mismatch
                $expected = (Resolve-Path .).Path.Substring(0,1)
                if ($content -match 'CMAKE_HOME_DIRECTORY:INTERNAL=([A-Z]):') {
                  if ($Matches[1] -ne $expected) {
                    Write-Host "❌ Cache drive mismatch."
                    $stale = $true
                  }
                }

                # Check generator mismatch — resolve the expected generator from the
                # configure preset, following the inherits chain.
                if ($content -match 'CMAKE_GENERATOR:INTERNAL=(.+)') {
                  $cachedGenerator = $Matches[1].Trim()
                  $allPresets = (Get-Content "CMakePresets.json" -Raw | ConvertFrom-Json).configurePresets
                  function Resolve-PresetGenerator([string]$name, [int]$depth = 0) {
                    if ($depth -gt 10) { return $null }
                    $p = $allPresets | Where-Object { $_.name -eq $name } | Select-Object -First 1
                    if (-not $p) { return $null }
                    if ($p.generator) { return $p.generator }
                    $parents = if ($p.inherits -is [array]) { $p.inherits } else { @($p.inherits) }
                    foreach ($parent in $parents) {
                      $gen = Resolve-PresetGenerator $parent ($depth + 1)
                      if ($gen) { return $gen }
                    }
                    return $null
                  }
                  $expectedGenerator = Resolve-PresetGenerator "${{ inputs.cmake-preset }}"
                  if ($expectedGenerator -and $expectedGenerator -ne $cachedGenerator) {
                    Write-Host "❌ Generator mismatch: cached='$cachedGenerator', expected='$expectedGenerator'"
                    $stale = $true
                  }
                }

                if ($stale) {
                  Write-Host "Removing stale $buildDir directory."
                  Remove-Item -Recurse -Force $buildDir
                }
              }
