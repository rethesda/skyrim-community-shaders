name: "Nexus: Upload Release"

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag to upload to Nexus"
                required: true
            nexus_game_id:
                description: "Nexus game ID"
                required: false
                default: "skyrimspecialedition"
            nexus_mod_id:
                description: "Nexus mod ID"
                required: false
                default: "86492"
            artifact_pattern:
                description: "Artifact glob pattern to select the package to upload"
                required: false
                default: "CommunityShaders-*.7z"
            mod_filename:
                description: "Filename used for the Nexus mod upload"
                required: false
                default: "Community Shaders"
            dry_run:
                description: "If true, do not upload to Nexus; only report the planned upload"
                required: false
                type: choice
                default: "true"
                options:
                    - "true"
                    - "false"
            changelog:
                description: "Optional release notes or changelog for Nexus"
                required: false
            nexus_file_group_id:
                description: "Nexus file group ID for the core mod"
                required: false
                default: "3119152"
    workflow_call:
        inputs:
            tag:
                description: "Release tag to upload to Nexus"
                required: true
                type: string
            nexus_game_id:
                required: false
                type: string
                default: "skyrimspecialedition"
            nexus_mod_id:
                required: false
                type: string
                default: "86492"
            artifact_pattern:
                required: false
                type: string
                default: "CommunityShaders-*.7z"
            mod_filename:
                required: false
                type: string
                default: "Community Shaders"
            dry_run:
                required: false
                type: string
                default: "true"
            changelog:
                required: false
                type: string
                default: ""
            nexus_file_group_id:
                required: false
                type: string
                default: "3119152"
        secrets:
            UNEX_APIKEY:
                required: false

# Least-privilege for the whole workflow: every job here only reads from
# GitHub (release listing via `gh api`, asset download via `gh release
# download`) and writes only to Nexus via the UNEX_* secrets. No mutation
# of repo state.
permissions:
    contents: read

jobs:
    prepare-nexus-matrix:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.generate.outputs.matrix }}
            upload_matrix: ${{ steps.generate.outputs.upload_matrix }}
            tag: ${{ steps.resolve.outputs.tag }}
            version: ${{ steps.resolve.outputs.version }}
            dry_run: ${{ steps.dryrun.outputs.dry_run }}
            has_uploads: ${{ steps.generate.outputs.has_uploads }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Resolve release tag
              id: resolve
              run: |
                  TAG="$INPUT_TAG"
                  if [ -z "$TAG" ]; then
                    echo 'No tag provided for Nexus upload' >&2
                    exit 1
                  fi
                  if [[ "$TAG" == *-* ]]; then
                    echo "ERROR: '$TAG' is a pre-release tag. Only stable releases are uploaded to Nexus." >&2
                    exit 1
                  fi
                  DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
                    --jq ".[] | select(.tag_name == \"$TAG\") | .draft" 2>/dev/null | head -1)
                  if [ "$DRAFT" != "false" ]; then
                    echo "ERROR: Release '$TAG' is not published. Publish the GitHub release before uploading to Nexus." >&2
                    exit 1
                  fi
                  VERSION="${TAG#v}"
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
              env:
                  INPUT_TAG: ${{ inputs.tag || '' }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute dry-run mode
              id: dryrun
              run: |
                  if [ "$INPUT_DRY_RUN" = "false" ]; then
                    echo "dry_run=false" >> $GITHUB_OUTPUT
                  else
                    echo "dry_run=true" >> $GITHUB_OUTPUT
                  fi
              env:
                  INPUT_DRY_RUN: ${{ inputs.dry_run || '' }}

            - name: Generate Nexus upload matrix
              id: generate
              run: |
                  ARGS=( --export-nexus-matrix --matrix-output nexus-matrix-raw.json )
                  PREVIOUS_TAG=$(git tag --merged "$RELEASE_TAG" --list 'v*.*.*' --sort=-v:refname 2>/dev/null \
                    | grep -v -- '-' \
                    | awk -v current="$RELEASE_TAG" '$0 != current { print; exit }')
                  if [ -n "$PREVIOUS_TAG" ]; then
                    ARGS+=( --base "$PREVIOUS_TAG" )
                  else
                    ARGS+=( --all-features )
                  fi
                  if [ -n "$INPUT_NEXUS_MOD_ID" ]; then
                    ARGS+=( --core-mod-id "$INPUT_NEXUS_MOD_ID" )
                  fi
                  if [ -n "$INPUT_MOD_FILENAME" ]; then
                    ARGS+=( --core-filename "$INPUT_MOD_FILENAME" )
                  fi
                  if [ -n "$INPUT_ARTIFACT_PATTERN" ]; then
                    ARGS+=( --core-artifact-pattern "$INPUT_ARTIFACT_PATTERN" )
                  fi
                  # Strip the leading 'v' so we get e.g. "1.5.2" — the value
                  # is rendered into Nexus file descriptions, where the
                  # bare semver is what users see in the UI.
                  RELEASE_VER="${RELEASE_TAG#v}"
                  ARGS+=( --release-version "$RELEASE_VER" )
                  python tools/feature_version_audit.py "${ARGS[@]}"

                  # Fetch the specific release by tag — avoids pagination issues with
                  # the releases list endpoint (default page size is 30).
                  gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
                    2>/dev/null > release.json || echo '{}' > release.json
                  python -c "
                  import json, os, re
                  with open('release.json') as f:
                      release = json.load(f)
                  if not isinstance(release, dict):
                      release = {}
                  body = release.get('body') or ''
                  # Strip feature audit appendix — Nexus changelog should only
                  # contain human-readable release notes, not the audit table.
                  body = re.sub(r'\n---\n+# Feature Version Audit\b.*', '', body, flags=re.DOTALL).strip()
                  with open('nexus-matrix-raw.json') as f:
                      data = json.load(f)
                  for row in data:
                      if row.get('name') == 'core':
                          row['changelog'] = body
                          break
                  with open('nexus-matrix-raw.json', 'w') as f:
                      json.dump(data, f)
                  "

                  # Inject core file_group_id from workflow input if provided.
                  if [ -n "$INPUT_NEXUS_FILE_GROUP_ID" ]; then
                    python -c "
                  import json, os
                  with open('nexus-matrix-raw.json') as f:
                      data = json.load(f)
                  for row in data:
                      if row.get('name') == 'core':
                          row['file_group_id'] = os.environ['INPUT_NEXUS_FILE_GROUP_ID']
                          break
                  with open('nexus-matrix-raw.json', 'w') as f:
                      json.dump(data, f)
                  "
                  fi

                  python -c "
                  import json, os, fnmatch
                  with open('nexus-matrix-raw.json') as f:
                      data = json.load(f)
                  # Load asset names from the release to skip uploads where the
                  # artifact was not included — applies to all rows including core.
                  try:
                      with open('release.json') as f:
                          release = json.load(f)
                      if not isinstance(release, dict):
                          release = {}
                  except Exception:
                      release = {}
                  asset_names = [a['name'] for a in release.get('assets', [])]
                  def artifact_in_release(row):
                      pat = row.get('artifact_pattern', '')
                      return bool(pat) and any(fnmatch.fnmatch(n, pat) for n in asset_names)
                  # Full matrix for artifact prep; upload matrix excludes auto_upload=false
                  # and features whose standalone artifact is absent from the release.
                  upload_data = [row for row in data
                                 if row.get('auto_upload', True) and artifact_in_release(row)]
                  # Drift detector: a feature opted in to auto_upload but its
                  # artifact pattern doesn't match anything on the release.
                  # This is almost always a metadata bug (folder name vs
                  # nexusfilename mismatch — see HDR Display in v1.5.2).
                  # Surface it loudly via GHA warning + step summary so it
                  # cannot silently drop a feature from a release again.
                  missing = [row for row in data
                             if row.get('auto_upload') is True
                             and not row.get('is_core')
                             and not artifact_in_release(row)]
                  if missing:
                      summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
                      lines = ['## ⚠️ Auto-upload features missing artifacts', '',
                               '| Feature | Pattern | Mod ID |',
                               '|---------|---------|--------|']
                      for row in missing:
                          name = row.get('name', '?')
                          pat = row.get('artifact_pattern', '?')
                          mod_id = row.get('nexus_mod_id', '?')
                          lines.append(f'| `{name}` | `{pat}` | {mod_id} |')
                          # Annotation appears inline in the run UI.
                          print(f'::warning title=Nexus auto-upload missing artifact::'
                                f'{name} (mod {mod_id}) marked autoupload=true but no '
                                f'release asset matches pattern {pat!r}. Likely cause: '
                                f'folder name differs from nexusfilename — set '
                                f'nexusartifactpattern explicitly in the feature .ini.')
                      lines += ['',
                                'These features are marked `autoupload = true` in their '
                                '`.ini` but no release asset matched their derived '
                                'artifact pattern. They will be skipped from this Nexus '
                                'upload. Add `nexusartifactpattern = <Folder.Name-*.7z>` '
                                'to the feature .ini to override the default derivation.']
                      if summary_path:
                          with open(summary_path, 'a') as f:
                              f.write('\n'.join(lines) + '\n')
                  has_uploads = bool(upload_data)
                  with open('nexus-matrix.json', 'w') as f:
                      json.dump({'include': data}, f)
                  with open('nexus-upload-matrix.json', 'w') as f:
                      json.dump({'include': upload_data or [{'name': '_empty', 'skip': True}]}, f)
                  with open('nexus-upload-state.json', 'w') as f:
                      json.dump({'has_uploads': has_uploads}, f)
                  "
                  DELIM=$(openssl rand -hex 8)
                  {
                    printf 'matrix<<%s\n' "$DELIM"
                    cat nexus-matrix.json
                    printf '\n%s\n' "$DELIM"
                    printf 'upload_matrix<<%s\n' "$DELIM"
                    cat nexus-upload-matrix.json
                    printf '\n%s\n' "$DELIM"
                  } >> "$GITHUB_OUTPUT"
                  HAS_UPLOADS=$(python -c 'import json; d=json.load(open("nexus-upload-state.json")); print("true" if d.get("has_uploads") else "false")')
                  echo "has_uploads=${HAS_UPLOADS}" >> "$GITHUB_OUTPUT"
              env:
                  RELEASE_TAG: ${{ steps.resolve.outputs.tag }}
                  INPUT_NEXUS_MOD_ID: ${{ inputs.nexus_mod_id || '' }}
                  INPUT_MOD_FILENAME: ${{ inputs.mod_filename || '' }}
                  INPUT_ARTIFACT_PATTERN: ${{ inputs.artifact_pattern || '' }}
                  INPUT_NEXUS_FILE_GROUP_ID: ${{ inputs.nexus_file_group_id || '' }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    prepare-artifacts:
        needs: prepare-nexus-matrix
        runs-on: ubuntu-latest
        strategy:
            matrix: ${{ fromJson(needs.prepare-nexus-matrix.outputs.matrix) }}
            fail-fast: false
        steps:
            - name: Download GitHub release assets
              run: |
                  mkdir -p release-assets
                  gh release download "${{ needs.prepare-nexus-matrix.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern "*.7z" --dir release-assets
                  ls -lah release-assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Select release artifact
              id: artifact
              continue-on-error: true
              run: |
                  pattern='${{ matrix.artifact_pattern }}'
                  echo "Searching for artifact matching: $pattern"
                  asset=$(find release-assets -maxdepth 1 -name "$pattern" | sort | head -n 1)
                  if [ -z "$asset" ]; then
                    echo "ERROR: No release artifact matching pattern '$pattern' found for ${{ matrix.name }}" >&2
                    echo "Available artifacts:"
                    ls -1 release-assets/ | sed 's/^/  /'
                    echo "artifact_found=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  echo "Found artifact: $asset"
                  echo "artifact_path=$asset" >> $GITHUB_OUTPUT
                  echo "artifact_found=true" >> $GITHUB_OUTPUT

            - name: Upload selected artifact as workflow artifact
              if: steps.artifact.outputs.artifact_found == 'true'
              uses: actions/upload-artifact@v7
              with:
                  name: nexus-upload-${{ matrix.name }}
                  path: ${{ steps.artifact.outputs.artifact_path }}
                  retention-days: 7

            - name: Report planned Nexus upload
              run: |
                  DRY_RUN="${{ needs.prepare-nexus-matrix.outputs.dry_run }}"
                  FOUND="${{ steps.artifact.outputs.artifact_found }}"
                  if [ "$FOUND" != "true" ]; then
                    echo "SKIPPED: No artifact found for ${{ matrix.name }}"
                    echo "Pattern: ${{ matrix.artifact_pattern }}"
                  else
                    echo "Planned Nexus upload:"
                    echo "  Nexus mod ID: ${{ matrix.nexus_mod_id }}"
                    echo "  Artifact name: nexus-upload-${{ matrix.name }}"
                    echo "  Release tag: ${{ needs.prepare-nexus-matrix.outputs.tag }}"
                    echo "  Version: ${{ matrix.mod_version || needs.prepare-nexus-matrix.outputs.version }}"
                    echo "  Mod filename: ${{ matrix.mod_filename }}"
                    echo "  Auto upload: ${{ matrix.auto_upload }}"
                    if [ "$DRY_RUN" = "true" ]; then
                      echo "Dry run enabled: skipping actual Nexus upload."
                    fi
                  fi

    check-nexus-versions:
        name: Dry Run — Check Nexus Versions
        needs: prepare-nexus-matrix
        if: >
            needs.prepare-nexus-matrix.outputs.dry_run == 'true' &&
            needs.prepare-nexus-matrix.outputs.has_uploads == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Query Nexus for existing versions
              run: |
                  python3 << 'PYEOF'
                  import json, os, urllib.request, urllib.error

                  rows = json.loads(os.environ['UPLOAD_MATRIX']).get('include', [])
                  rows = [r for r in rows if not r.get('skip')]
                  version = os.environ.get('VERSION', '')
                  game_id = os.environ.get('NEXUS_GAME_ID', 'skyrimspecialedition')
                  api_key = os.environ.get('UNEX_APIKEY', '')
                  summary = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')

                  def w(line=''):
                      print(line)
                      summary.write(line + '\n')

                  w('## Dry Run — Nexus Version Check')
                  w()
                  if not api_key:
                      w('> **Warning:** UNEX_APIKEY is not set — cannot query Nexus.')
                      w()
                  w('| Feature | Planned | Status | Versions on Nexus |')
                  w('|---------|---------|--------|-------------------|')

                  api_ok = False
                  for row in rows:
                      name = row.get('name', '')
                      mod_id = str(row.get('nexus_mod_id', ''))
                      planned = row.get('mod_version') or version
                      label = row.get('mod_filename', name)
                      url = f'https://www.nexusmods.com/{game_id}/mods/{mod_id}'
                      link = f'[{label}]({url})'

                      if not api_key or not mod_id:
                          w(f'| {link} | `{planned}` | ⚠️ skipped | — |')
                          continue

                      api_url = f'https://api.nexusmods.com/v1/games/{game_id}/mods/{mod_id}/files.json'
                      req = urllib.request.Request(api_url, headers={
                          'apikey': api_key,
                          'User-Agent': 'community-shaders-ci/1.0',
                          'Accept': 'application/json',
                      })
                      try:
                          with urllib.request.urlopen(req, timeout=15) as resp:
                              data = json.load(resp)
                          api_ok = True
                          files = data.get('files', [])
                          main = [f for f in files if f.get('category_name') == 'MAIN']
                          check = main if main else files
                          seen = []
                          for f in check:
                              v = f.get('version', '')
                              if v and v not in seen:
                                  seen.append(v)
                          versions_str = ', '.join(f'`{v}`' for v in seen[-5:]) or '—'
                          status = '✅ exists' if planned in seen else '🆕 new'
                          w(f'| {link} | `{planned}` | {status} | {versions_str} |')
                      except urllib.error.HTTPError as e:
                          err = {401: '❌ auth failed', 403: '❌ forbidden'}.get(e.code, f'❌ HTTP {e.code}')
                          w(f'| {link} | `{planned}` | {err} | — |')
                      except Exception:
                          w(f'| {link} | `{planned}` | ❌ error | — |')

                  w()
                  if api_key:
                      if api_ok:
                          w('> ✓ UNEX_APIKEY validated.')
                      else:
                          w('> ⚠️ UNEX_APIKEY may be invalid — all API calls failed.')
                  summary.close()
                  PYEOF
              env:
                  UPLOAD_MATRIX: ${{ needs.prepare-nexus-matrix.outputs.upload_matrix }}
                  VERSION: ${{ needs.prepare-nexus-matrix.outputs.version }}
                  NEXUS_GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
                  UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}

    upload-to-nexus:
        needs: [prepare-nexus-matrix, prepare-artifacts]
        if: >
            needs.prepare-nexus-matrix.outputs.dry_run != 'true' &&
            needs.prepare-nexus-matrix.outputs.has_uploads == 'true'
        runs-on: ubuntu-latest
        strategy:
            matrix: ${{ fromJson(needs.prepare-nexus-matrix.outputs.upload_matrix) }}
            fail-fast: false
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v7
              with:
                  name: nexus-upload-${{ matrix.name }}
                  path: upload/

            - name: Check if version already exists on Nexus
              id: version-check
              env:
                  MOD_ID: ${{ matrix.nexus_mod_id }}
                  VERSION: ${{ matrix.mod_version || needs.prepare-nexus-matrix.outputs.version }}
                  GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
                  API_KEY: ${{ secrets.UNEX_APIKEY }}
              run: |
                  if [ -z "$API_KEY" ] || [ -z "$MOD_ID" ]; then
                    echo "should_upload=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  EXISTING=$(curl -sf \
                    -H "apikey: $API_KEY" \
                    -H "Accept: application/json" \
                    "https://api.nexusmods.com/v1/games/$GAME_ID/mods/$MOD_ID/files.json" \
                    | python3 -c "
                  import json, sys, os
                  data = json.load(sys.stdin)
                  main = [f for f in data.get('files', []) if f.get('category_name') == 'MAIN']
                  versions = [f.get('version', '') for f in (main or data.get('files', []))]
                  print('true' if os.environ['VERSION'] in versions else 'false')
                  " 2>/dev/null || echo "false")
                  if [ "$EXISTING" = "true" ]; then
                    echo "Version $VERSION already exists on Nexus for mod $MOD_ID — skipping upload."
                    echo "should_upload=false" >> $GITHUB_OUTPUT
                  else
                    echo "should_upload=true" >> $GITHUB_OUTPUT
                  fi

            - name: Find artifact and build description
              if: steps.version-check.outputs.should_upload == 'true'
              id: prep
              env:
                  FILE_DESC: ${{ matrix.file_description }}
                  RELEASE_TAG: ${{ needs.prepare-nexus-matrix.outputs.tag }}
                  REPO: ${{ github.repository }}
              run: |
                  FILE=$(find upload/ -maxdepth 1 -name "*.7z" | sort | head -n 1)
                  if [ -z "$FILE" ]; then
                    echo "ERROR: No .7z file found in upload/ directory" >&2
                    exit 1
                  fi
                  echo "file=$FILE" >> $GITHUB_OUTPUT
                  LINK="https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
                  if [ -n "$FILE_DESC" ]; then
                    printf 'description=%s Full changelog: %s\n' "$FILE_DESC" "$LINK" >> $GITHUB_OUTPUT
                  else
                    printf 'description=Full changelog: %s\n' "$LINK" >> $GITHUB_OUTPUT
                  fi

            - name: Validate file_group_id
              if: steps.version-check.outputs.should_upload == 'true'
              env:
                  FILE_GROUP_ID: ${{ matrix.file_group_id }}
                  MOD_NAME: ${{ matrix.mod_filename }}
              run: |
                  if [ -z "$FILE_GROUP_ID" ] || [ "$FILE_GROUP_ID" = "000000" ]; then
                    echo "ERROR: file_group_id is '${FILE_GROUP_ID}' for '$MOD_NAME'." >&2
                    echo "Set nexusfilegroupid in the feature's [Nexus] ini section." >&2
                    exit 1
                  fi

            - name: Upload to Nexus
              id: upload
              if: steps.version-check.outputs.should_upload == 'true'
              continue-on-error: true
              uses: Nexus-Mods/upload-action@a746f1867153abc77beed950bf7526ece1a9f8c4  # v1.0.0-beta.5
              with:
                  api_key: ${{ secrets.UNEX_APIKEY }}
                  file_group_id: ${{ matrix.file_group_id }}
                  filename: ${{ steps.prep.outputs.file }}
                  version: ${{ matrix.mod_version || needs.prepare-nexus-matrix.outputs.version }}
                  display_name: ${{ matrix.mod_filename }}
                  description: ${{ steps.prep.outputs.description }}
                  file_category: main

            - name: Report upload failure
              if: steps.upload.outcome == 'failure'
              env:
                  MOD_NAME: ${{ matrix.mod_filename }}
                  MOD_ID: ${{ matrix.nexus_mod_id }}
                  FILE_GROUP_ID: ${{ matrix.file_group_id }}
                  VERSION: ${{ matrix.mod_version || needs.prepare-nexus-matrix.outputs.version }}
                  GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
                  ARTIFACT_NAME: nexus-upload-${{ matrix.name }}
              run: |
                  {
                    echo "## ❌ Upload failed: $MOD_NAME v$VERSION"
                    echo ""
                    echo "| Field | Value |"
                    echo "|-------|-------|"
                    echo "| Mod | [$MOD_NAME](https://www.nexusmods.com/$GAME_ID/mods/$MOD_ID) |"
                    echo "| Version | \`$VERSION\` |"
                    echo "| File group ID | \`$FILE_GROUP_ID\` |"
                    echo "| Artifact | \`$ARTIFACT_NAME\` |"
                    echo ""
                    echo "**Check the _Upload to Nexus_ step log above for the specific error.**"
                    echo ""
                    echo "To upload manually: download \`$ARTIFACT_NAME\` from this workflow run's"
                    echo "artifacts and upload it to the mod's Files page on Nexus."
                  } >> "$GITHUB_STEP_SUMMARY"
                  exit 1

    upload-summary:
        name: Upload Summary
        runs-on: ubuntu-latest
        needs: [prepare-nexus-matrix, prepare-artifacts, upload-to-nexus, check-nexus-versions]
        if: always() && needs.prepare-nexus-matrix.result == 'success'
        steps:
            - name: Check upload status
              run: |
                  echo "## Nexus Upload Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
                  echo "**Tag:** ${{ needs.prepare-nexus-matrix.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "**Dry run:** ${{ needs.prepare-nexus-matrix.outputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

            - name: Report dry-run result
              if: needs.prepare-nexus-matrix.outputs.dry_run == 'true'
              run: |
                  echo "ℹ️ Dry run — no files were uploaded to Nexus" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**To make a real upload:**" >> $GITHUB_STEP_SUMMARY
                  echo "1. Re-run this workflow" >> $GITHUB_STEP_SUMMARY
                  echo "2. Set \`dry_run: false\` in the workflow inputs" >> $GITHUB_STEP_SUMMARY

            - name: Report upload result
              if: needs.prepare-nexus-matrix.outputs.dry_run != 'true' && needs.prepare-nexus-matrix.outputs.has_uploads == 'true'
              run: |
                  python3 << 'PYEOF'
                  import json, os, urllib.request, urllib.error

                  rows = json.loads(os.environ['UPLOAD_MATRIX']).get('include', [])
                  rows = [r for r in rows if not r.get('skip')]
                  version = os.environ.get('VERSION', '')
                  game_id = os.environ.get('NEXUS_GAME_ID', 'skyrimspecialedition')
                  api_key = os.environ.get('UNEX_APIKEY', '')
                  summary = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')

                  def w(line=''):
                      summary.write(line + '\n')

                  def nexus_versions(mod_id):
                      if not api_key or not mod_id:
                          return None
                      url = f'https://api.nexusmods.com/v1/games/{game_id}/mods/{mod_id}/files.json'
                      req = urllib.request.Request(url, headers={
                          'apikey': api_key,
                          'User-Agent': 'community-shaders-ci/1.0',
                          'Accept': 'application/json',
                      })
                      try:
                          with urllib.request.urlopen(req, timeout=15) as resp:
                              files = json.load(resp).get('files', [])
                          main = [f for f in files if f.get('category_name') == 'MAIN']
                          check = main if main else files
                          seen = []
                          for f in check:
                              v = f.get('version', '')
                              if v and v not in seen:
                                  seen.append(v)
                          return seen
                      except Exception:
                          return None

                  succeeded, failed, unknowns = [], [], []
                  rows_status = []
                  for row in rows:
                      name = row.get('name', '')
                      mod_id = str(row.get('nexus_mod_id', ''))
                      planned = row.get('mod_version') or version
                      label = row.get('mod_filename', name)
                      url = f'https://www.nexusmods.com/{game_id}/mods/{mod_id}'
                      artifact = f'nexus-upload-{name}'
                      versions = nexus_versions(mod_id)
                      if versions is None:
                          status, icon = 'unknown', '❓'
                          unknowns.append(label)
                      elif planned in versions:
                          status, icon = 'uploaded', '✅'
                          succeeded.append(label)
                      else:
                          status, icon = 'failed', '❌'
                          failed.append(label)
                      rows_status.append((icon, label, planned, url, artifact, status))

                  if failed or unknowns:
                      parts = []
                      if failed:
                          parts.append(f'{len(failed)} failed')
                      if unknowns:
                          parts.append(f'{len(unknowns)} unknown')
                      w(f'⚠️ {", ".join(parts)} — {len(succeeded)} succeeded')
                  else:
                      w(f'✅ All {len(succeeded)} Nexus upload(s) completed successfully')
                  w()
                  w('| Status | Feature | Version | Nexus | Artifact |')
                  w('|--------|---------|---------|-------|----------|')
                  for icon, label, planned, url, artifact, status in rows_status:
                      art = f'`{artifact}`' if status in ('failed', 'unknown') else '—'
                      w(f'| {icon} | [{label}]({url}) | `{planned}` | [View]({url}) | {art} |')
                  if failed or unknowns:
                      w()
                      w('Re-run is safe: already-uploaded versions will be automatically skipped.')

                  summary.close()
                  PYEOF
              env:
                  UPLOAD_MATRIX: ${{ needs.prepare-nexus-matrix.outputs.upload_matrix }}
                  VERSION: ${{ needs.prepare-nexus-matrix.outputs.version }}
                  NEXUS_GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
                  UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
