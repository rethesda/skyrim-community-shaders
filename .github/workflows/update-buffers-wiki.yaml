name: Update Buffers Wiki

on:
    push:
        branches:
            - dev
        paths:
            - "features/**/*.hlsl"
            - "features/**/*.hlsli"
            - "package/Shaders/**/*.hlsl"
            - "package/Shaders/**/*.hlsli"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-wiki:
        name: Update Buffer Documentation
        runs-on: windows-2022
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Build Environment
              uses: ./.github/actions/setup-build-environment
              with:
                  cache-key-suffix: wiki

            - name: Prepare shaders
              uses: ./.github/actions/prepare-shaders

            - name: Create wiki content directory
              run: mkdir -p wiki-content
              shell: bash

            - name: Scan buffer usage
              run: |
                  set -euo pipefail

                  SHADER_DIR="build/ALL/aio/Shaders"
                  OUTPUT_REL_PATH="wiki-content/Buffers.md"
                  OUTPUT_PATH="../../../../${OUTPUT_REL_PATH}"

                  if [ ! -d "${SHADER_DIR}" ]; then
                      echo "Error: Shader directory '${SHADER_DIR}' does not exist." >&2
                      exit 1
                  fi

                  cd "${SHADER_DIR}"

                  if ! hlslkit-buffer-scan > "${OUTPUT_PATH}"; then
                      echo "Error: hlslkit-buffer-scan failed to complete successfully." >&2
                      exit 1
                  fi

                  if [ ! -s "${OUTPUT_PATH}" ]; then
                      echo "Error: Buffer scan produced no output at '${OUTPUT_PATH}'." >&2
                      exit 1
                  fi
              shell: bash

            - name: Upload to Wiki
              uses: Andrew-Chen-Wang/github-wiki-action@v5
              with:
                  path: wiki-content/
                  token: ${{ secrets.GITHUB_TOKEN }}
