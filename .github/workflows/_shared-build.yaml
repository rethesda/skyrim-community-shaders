name: "(Shared) Build and Validate"

on:
    workflow_call:
        inputs:
            ref:
                description: "Git ref to check out"
                type: string
                required: true
            repository:
                description: "Repository to check out (owner/repo)"
                type: string
                required: true
            run-cpp:
                description: "Run C++ plugin build"
                type: boolean
                default: true
            run-shader-validation:
                description: "Run HLSL shader compilation validation"
                type: boolean
                default: true
            hlsl-should-build:
                description: "Passed to check-hlsl-changes; 'true' forces shader steps to run"
                type: string
                default: "true"
            cache-key-suffix:
                description: "Optional suffix to invalidate the build cache"
                type: string
                default: ""
            cmake-preset:
                description: "CMake configure/build preset for the C++ build (ALL = full LTCG shipping flags; PR = mild optimization without LTCG or full debug info)"
                type: string
                default: "ALL"
        outputs:
            version:
                description: "CMake project version extracted from the build"
                value: ${{ jobs.cpp-build.outputs.version }}
            cpp-built:
                description: "'true' if the C++ build job ran and succeeded"
                value: ${{ jobs.cpp-build.result == 'success' }}

jobs:
    cpp-build:
        name: Build plugin and addons (${{ matrix.compiler.name }})
        if: inputs.run-cpp
        runs-on: windows-2025
        permissions:
            contents: read
        outputs:
            version: ${{ steps.get_version.outputs.version }}
        strategy:
            matrix:
                compiler:
                    - name: vs2026
                      cmake-preset: ${{ inputs.cmake-preset }}
                      build-dir: build/${{ inputs.cmake-preset }}
            fail-fast: false
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
                  repository: ${{ inputs.repository }}
                  submodules: recursive

            - name: Setup Build Environment
              id: setup
              uses: ./.github/actions/setup-build-environment
              with:
                  cache-key-suffix: "cpp-${{ matrix.compiler.name }}${{ inputs.cache-key-suffix }}"
                  cmake-preset: ${{ matrix.compiler.cmake-preset }}
                  build-dir: ${{ matrix.compiler.build-dir }}

            - name: Build using run-cmake
              uses: lukka/run-cmake@v10
              with:
                  configurePreset: ${{ matrix.compiler.cmake-preset }}
                  buildPreset: ${{ matrix.compiler.cmake-preset }}

            - name: Extract version from CMake
              id: get_version
              shell: pwsh
              run: |
                  $content = Get-Content ${{ matrix.compiler.build-dir }}/CMakeCache.txt
                  $versionLine = $content | Select-String -Pattern 'CMAKE_PROJECT_VERSION:STATIC'
                  if ($versionLine) {
                      $version = ($versionLine -replace '.*=([0-9]+\.[0-9]+\.[0-9]+).*', '$1').ToString()
                  } else {
                      Write-Error "Version extraction failed: CMAKE_PROJECT_VERSION not found in CMakeCache.txt" -ErrorAction Stop
                  }
                  if (-not $version -or $version -eq "") {
                      Write-Error "Version extraction failed: no version found" -ErrorAction Stop
                  }
                  "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            - name: Fail if CMake version does not match tag
              if: success() && github.ref_type == 'tag'
              shell: pwsh
              run: |
                  $tag = '${{ github.ref_name }}'
                  $expected = ($tag -replace '^v([0-9]+\.[0-9]+\.[0-9]+).*', '$1')
                  $version = '${{ steps.get_version.outputs.version }}'
                  if (-not $version -or $version -eq "") {
                    Write-Error "Version extraction failed: no version found in previous step" -ErrorAction Stop
                  }
                  if ($version -ne $expected) {
                    Write-Error "CMakeLists.txt version '$version' does not match tag version '$expected'. Please update CMakeLists.txt before tagging." -ErrorAction Stop
                  } else {
                    Write-Host "CMakeLists.txt version matches tag."
                  }

            - name: Upload dist artifacts
              if: success() && matrix.compiler.name == 'vs2026'
              uses: actions/upload-artifact@v7
              with:
                  name: dist-artifacts
                  path: dist/
                  retention-days: 30

    shader-validation:
        if: inputs.run-shader-validation
        name: Validate shader compilation
        runs-on: windows-2025
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
                  repository: ${{ inputs.repository }}
                  submodules: recursive

            - name: Check for HLSL Changes
              id: check-hlsl
              uses: ./.github/actions/check-hlsl-changes
              with:
                  hlsl-should-build: ${{ inputs.hlsl-should-build }}
            - name: Setup Build Environment
              id: setup
              if: steps.check-hlsl.outputs.skip != 'true'
              uses: ./.github/actions/setup-build-environment
              with:
                  cache-key-suffix: "validation${{ inputs.cache-key-suffix }}"
            - name: Prepare shaders
              if: steps.check-hlsl.outputs.skip != 'true'
              uses: ./.github/actions/prepare-shaders
            - name: Locate fxc.exe
              if: steps.check-hlsl.outputs.skip != 'true'
              id: find_fxc
              shell: pwsh
              run: |
                  $fxcCmd = Get-Command -Name fxc.exe -ErrorAction SilentlyContinue
                  if ($fxcCmd) {
                    $fxcPath = $fxcCmd.Source
                    Write-Host "Found fxc.exe at $fxcPath"
                    Add-Content -Path $env:GITHUB_OUTPUT -Value "fxc_path=$fxcPath"
                  } else {
                    $fxcPath = ''
                    $sdkRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
                    if (Test-Path $sdkRoot) {
                      $versions = Get-ChildItem -Path $sdkRoot -Directory | Sort-Object -Descending
                      foreach ($v in $versions) {
                        $candidate = Join-Path $v.FullName 'x64\fxc.exe'
                        if (Test-Path $candidate) { $fxcPath = $candidate; break }
                      }
                    }
                    if ($fxcPath -ne '') {
                      Write-Host "Found fxc.exe at $fxcPath"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "fxc_path=$fxcPath"
                    } else {
                      Write-Warning "fxc.exe not found in PATH or common SDK locations"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "fxc_path="
                    }
                  }

            # --shader-dir stays on build/ALL: prepare-shaders always populates
            # the ALL preset; inputs.cmake-preset only selects the C++ tier.
            - name: Validate shader compilation
              if: steps.check-hlsl.outputs.skip != 'true'
              shell: bash
              run: |
                  if [ -z "${{ steps.find_fxc.outputs.fxc_path }}" ]; then
                    echo "fxc.exe not found - shader validation requires fxc.exe. Set --fxc to a valid path or ensure fxc.exe is in PATH." >&2
                    exit 1
                  fi
                  hlslkit-compile --fxc "${{ steps.find_fxc.outputs.fxc_path }}" --shader-dir build/ALL/aio/Shaders --output-dir build/ShaderCache --config .github/configs/shader-validation.yaml --max-warnings 0 --suppress-warnings X1519

            - name: Upload shader validation logs
              if: failure() && steps.check-hlsl.outputs.skip != 'true'
              uses: actions/upload-artifact@v7
              with:
                  name: shader-validation-logs
                  path: |
                      build/ShaderCache/new_issues.log
                      build/ShaderCache/*.log
                  retention-days: 7
                  if-no-files-found: ignore
