name: "Release: Build Artifacts"

on:
    push:
        tags:
            - "v*"
    release:
        types: [created]
    workflow_dispatch:
        inputs:
            cache-key-suffix:
                description: "Optional suffix to invalidate the build cache"
                required: false
            build-cpp:
                description: "Build C++ plugin and addons for manual dispatch"
                type: boolean
                required: false
                default: true
            validate-shaders:
                description: "Run HLSL shader validation for manual dispatch"
                type: boolean
                required: false
                default: true

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        uses: ./.github/workflows/_shared-build.yaml
        with:
            ref: ${{ github.ref }}
            repository: ${{ github.repository }}
            run-cpp: ${{ github.event_name != 'workflow_dispatch' || inputs.build-cpp == true }}
            run-shader-validation: ${{ github.event_name != 'workflow_dispatch' || inputs.validate-shaders == true }}
            run-shader-tests: ${{ github.event_name != 'workflow_dispatch' || inputs.validate-shaders == true }}
            cache-key-suffix: ${{ inputs.cache-key-suffix || '' }}

    feature-audit:
        name: Feature Version Audit (Release)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Run feature version audit
              run: |
                  python tools/feature_version_audit.py --output feature-version-audit-latest.md
                  cat feature-version-audit-latest.md

            - name: Upload feature audit markdown
              uses: actions/upload-artifact@v7
              with:
                  name: feature-version-audit
                  path: feature-version-audit-latest.md

    release:
        name: Post Release for Draft, Manual Run, or Tag
        needs: [build, feature-audit]
        if: >
            always() && !cancelled() &&
            needs.build.outputs.cpp-built == 'true' &&
            (github.event_name == 'workflow_dispatch' ||
             startsWith(github.ref, 'refs/tags/v') ||
             (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))
        runs-on: windows-2025
        outputs:
            release_tag: ${{ steps.combined_notes.outputs.release_tag }}
        permissions:
            contents: write
        steps:
            - name: Ensure ref is a tag
              if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
              shell: bash
              run: |
                  if [ "${{ github.ref_type }}" != "tag" ]; then
                    echo "This workflow must be run on a tag, not a branch."
                    exit 1
                  fi

            - name: Download dist artifacts
              uses: actions/download-artifact@v7
              with:
                  name: dist-artifacts
                  path: dist/

            - name: Download feature audit artifact
              continue-on-error: true
              uses: actions/download-artifact@v7
              with:
                  name: feature-version-audit
                  path: .

            - name: Generate combined release notes
              id: combined_notes
              shell: bash
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                    RELEASE_TAG="${{ github.event.release.tag_name }}"
                  else
                    RELEASE_TAG="${{ github.ref_name }}"
                  fi

                  gh release view $RELEASE_TAG --json body -q .body > auto-release-notes.md || echo '' > auto-release-notes.md
                  if [ -f feature-version-audit-latest.md ]; then
                    echo -e "\n---\n\n" >> auto-release-notes.md
                    cat feature-version-audit-latest.md >> auto-release-notes.md
                  fi
                  echo "body_file=auto-release-notes.md" >> $GITHUB_OUTPUT
                  echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

            - name: Create or Update Release
              id: create_release
              uses: ncipollo/release-action@v1
              with:
                  name: "Community Shaders ${{ steps.combined_notes.outputs.release_tag }}"
                  draft: true
                  tag: ${{ steps.combined_notes.outputs.release_tag }}
                  artifacts: "${{ github.workspace }}/dist/*.7z"
                  bodyFile: ${{ steps.combined_notes.outputs.body_file }}
                  generateReleaseNotes: false
                  replacesArtifacts: true
                  removeArtifacts: true
                  allowUpdates: true
