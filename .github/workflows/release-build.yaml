name: "Release: Build Artifacts"

on:
    push:
        tags:
            - "v*"
    release:
        # 'published' covers semantic-release's draft → human publish path
        # (drafts do not fire the 'created' event in practice). 'created'
        # remains for non-draft releases authored directly via the UI/API.
        types: [created, published]
    workflow_dispatch:
        inputs:
            cache-key-suffix:
                description: "Optional suffix to invalidate the build cache"
                required: false
            build-cpp:
                description: "Build C++ plugin and addons for manual dispatch"
                type: boolean
                required: false
                default: true
            validate-shaders:
                description: "Run HLSL shader validation for manual dispatch"
                type: boolean
                required: false
                default: true

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        # Build on dispatch / tag push / a non-draft `release: created`, but NOT
        # on `release: published`: the artifacts were already built and attached
        # when the draft was created, so publishing must not rebuild.
        if: github.event.action != 'published'
        uses: ./.github/workflows/_shared-build.yaml
        with:
            ref: ${{ github.ref }}
            repository: ${{ github.repository }}
            run-cpp: ${{ github.event_name != 'workflow_dispatch' || inputs.build-cpp == true }}
            run-shader-validation: ${{ github.event_name != 'workflow_dispatch' || inputs.validate-shaders == true }}
            cache-key-suffix: ${{ inputs.cache-key-suffix || '' }}

    feature-audit:
        name: Feature Version Audit (Release)
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release') && github.event.action != 'published'
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Run feature version audit
              run: |
                  python tools/feature_version_audit.py --output feature-version-audit-latest.md
                  cat feature-version-audit-latest.md

            - name: Upload feature audit markdown
              uses: actions/upload-artifact@v7
              with:
                  name: feature-version-audit
                  path: feature-version-audit-latest.md

    release:
        name: Post Release for Draft, Manual Run, or Tag
        needs: [build, feature-audit]
        if: >
            always() && !cancelled() &&
            needs.build.outputs.cpp-built == 'true' &&
            github.event.action != 'published' &&
            (github.event_name == 'workflow_dispatch' ||
             startsWith(github.ref, 'refs/tags/v') ||
             (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))
        runs-on: windows-2025
        outputs:
            release_tag: ${{ steps.combined_notes.outputs.release_tag }}
        permissions:
            contents: write
        steps:
            - name: Ensure ref is a tag
              if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
              shell: bash
              run: |
                  if [ "${{ github.ref_type }}" != "tag" ]; then
                    echo "This workflow must be run on a tag, not a branch."
                    exit 1
                  fi

            - name: Download dist artifacts
              uses: actions/download-artifact@v7
              with:
                  name: dist-artifacts
                  path: dist/

            - name: Download feature audit artifact
              continue-on-error: true
              uses: actions/download-artifact@v7
              with:
                  name: feature-version-audit
                  path: .

            - name: Generate combined release notes
              id: combined_notes
              shell: bash
              # GH_TOKEN is required for `gh release view` — without it the
              # call silently failed and the `||` fallback wrote an empty
              # file, which then clobbered the existing release body when
              # ncipollo updated it (this happened on v1.5.1).
              #
              # GH_REPO is required because this job downloads artifacts but
              # never runs actions/checkout. Without it `gh` falls back to
              # `git remote` to infer the repo and dies with "fatal: not a
              # git repository" — which then mismatches the `release not
              # found` fallback grep and aborts the whole step (this
              # happened on v1.5.2: run 25871339509).
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail

                  if [ "${{ github.event_name }}" = "release" ]; then
                    RELEASE_TAG="${{ github.event.release.tag_name }}"
                  else
                    RELEASE_TAG="${{ github.ref_name }}"
                  fi

                  # Fetch existing body. If the release does not exist yet
                  # (e.g. tag-push trigger before any release was created),
                  # treat empty as acceptable. Any other failure is fatal so
                  # we never clobber a real body with empty content.
                  if gh release view "$RELEASE_TAG" --json body -q .body > auto-release-notes.md 2>/tmp/gh-err; then
                    :
                  else
                    if grep -q 'release not found' /tmp/gh-err; then
                      echo "Release $RELEASE_TAG does not exist yet; starting with empty body."
                      : > auto-release-notes.md
                    else
                      echo "::error::Failed to fetch release body for $RELEASE_TAG:"
                      cat /tmp/gh-err
                      exit 1
                    fi
                  fi

                  if [ -f feature-version-audit-latest.md ]; then
                    # Strip any prior audit section so re-runs don't duplicate
                    # it. Find the first "# Feature Version Audit" heading and
                    # drop everything from the preceding "---" separator
                    # onward.
                    audit_line=$(grep -nx '# Feature Version Audit' auto-release-notes.md | head -1 | cut -d: -f1 || true)
                    if [ -n "${audit_line:-}" ]; then
                      sep_line=$(awk -v target="$audit_line" 'NR < target && /^---$/ { last = NR } END { print last }' auto-release-notes.md)
                      if [ -n "${sep_line:-}" ]; then
                        head -n $((sep_line - 1)) auto-release-notes.md > auto-release-notes.tmp
                        mv auto-release-notes.tmp auto-release-notes.md
                      fi
                    fi
                    echo -e "\n---\n\n" >> auto-release-notes.md
                    cat feature-version-audit-latest.md >> auto-release-notes.md
                  fi
                  echo "body_file=auto-release-notes.md" >> $GITHUB_OUTPUT
                  echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

            - name: Create or Update Release
              id: create_release
              uses: ncipollo/release-action@v1
              with:
                  name: "Community Shaders ${{ steps.combined_notes.outputs.release_tag }}"
                  draft: true
                  omitDraftDuringUpdate: true
                  tag: ${{ steps.combined_notes.outputs.release_tag }}
                  artifacts: "${{ github.workspace }}/dist/*.zip"
                  bodyFile: ${{ steps.combined_notes.outputs.body_file }}
                  generateReleaseNotes: false
                  replacesArtifacts: true
                  removeArtifacts: true
                  allowUpdates: true

    nexus-dry-run:
        # Runs only on publish, independently of the build jobs (which are
        # skipped on publish). Artifacts were already built and attached to the
        # release when its draft was created, and nexus-upload downloads them
        # from the release assets — so there is nothing to wait on and no rebuild.
        # Stable tags only (no '-' in the tag name).
        name: Nexus Upload (dry run)
        if: >
            github.event_name == 'release' &&
            github.event.action == 'published' &&
            !contains(github.event.release.tag_name, '-')
        uses: ./.github/workflows/nexus-upload.yaml
        with:
            tag: ${{ github.event.release.tag_name }}
            artifact_pattern: "CommunityShaders-*.zip"
            dry_run: "true"
        secrets:
            UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
