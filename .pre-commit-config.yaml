repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
            args: [--markdown-linebreak-ext=md]
          - id: check-yaml

    - repo: https://github.com/pre-commit/mirrors-clang-format
      rev: v22.1.2
      hooks:
          - id: clang-format
            args: [--style=file]
            types_or: [file]
            files: \.(h|hpp|c|cpp|hlsl|hlsli)$
            exclude: ^(extern|include)/

    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v4.0.0-alpha.8
      hooks:
          - id: prettier
            additional_dependencies: ["prettier@3.1.0"]
            files: \.(json|md|yml|yaml)$
            exclude: ^(\.\/)?(extern|include|build|dist)\/
    - repo: https://github.com/BlankSpruce/gersemi
      rev: 0.26.1
      hooks:
          - id: gersemi
            files: '(^CMakeLists.txt$|.*\\.cmake$)'
ci:
    autofix_commit_msg: |
        style: 🎨 apply pre-commit.ci formatting

        Automated formatting by clang-format, prettier, and other hooks.
        See https://pre-commit.ci for details.
    autofix_prs: true
    autoupdate_commit_msg: "build(deps): update pre-commit hooks"
